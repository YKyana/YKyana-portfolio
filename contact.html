<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yana Kyslichenko</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Yana Kyslichenko</a>
        <button class="menu-toggle" aria-label="Меню">
            <span></span><span></span><span></span>
        </button>
        <nav class="nav-menu">
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="about.html">About</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main style="padding: 100px 60px; max-width: 900px; margin: 0 auto;">
        <h1 style="font-size: 52px; margin-bottom: 60px;">Get In Touch</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 80px;">
            <div>
                <h2>Напишіть мені</h2>
                <p>Я завжди відкрита до нових проєктів і співпраці.</p>
                
                <!-- Форма контактів (можна пізніше розширити) -->
                <form style="margin-top: 40px;">
                    <input type="text" placeholder="Ваше ім'я" style="width:100%; padding:14px; margin-bottom:16px; background:#222; border:none; color:white; border-radius:8px;">
                    <input type="email" placeholder="Email" style="width:100%; padding:14px; margin-bottom:16px; background:#222; border:none; color:white; border-radius:8px;">
                    <textarea placeholder="Повідомлення" rows="6" style="width:100%; padding:14px; background:#222; border:none; color:white; border-radius:8px;"></textarea>
                    <button type="submit" class="button" style="margin-top:20px;">Надіслати</button>
                </form>
            </div>
            
            <div>
                <h2>Контакти</h2>
                <p>Email: <a href="mailto:your@email.com" style="color:#4EA1FF;">your@email.com</a></p>
                <p>LinkedIn / ArtStation / Telegram — пізніше заповниш</p>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yana | Hard Surface 3D Artist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .hero-bg {
      background: linear-gradient(135deg, #1e1233 0%, #2a1b4d 50%, #3b1e5e 100%);
    }
    .accent-gradient {
      background: linear-gradient(90deg, #c026d3, #7e22ce);
    }
    .section-title {
      position: relative;
      display: inline-block;
    }
    .section-title::after {
      content: '';
      position: absolute;
      width: 70px;
      height: 4px;
      background: linear-gradient(to right, #c026d3, #7e22ce);
      bottom: -12px;
      left: 0;
    }
    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-[#0c0a1f] text-white dark:bg-gray-50 dark:text-gray-900 transition-colors">

  <!-- HEADER -->
  <header class="fixed top-0 w-full z-50 glass border-b border-white/10">
    <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
      <div class="text-3xl font-bold tracking-tighter">Yana</div>
      
      <div class="hidden md:flex items-center gap-10 text-lg">
        <a href="#about" class="hover:text-purple-400 transition-colors">About</a>
        <a href="#skills" class="hover:text-purple-400 transition-colors">Skills</a>
        <a href="#resume" class="hover:text-purple-400 transition-colors">Resume</a>
        <a href="portfolio.html" class="hover:text-purple-400 transition-colors">Portfolio</a>
      </div>

      <div class="flex items-center gap-5">
        <button id="theme-toggle" class="p-3 rounded-2xl hover:bg-white/10 transition-all text-2xl">
          <i class="fas fa-moon"></i>
        </button>
        <a href="#contact" class="accent-gradient px-8 py-3.5 rounded-3xl font-semibold hover:scale-105 transition-all">
          Contact me
        </a>
        <button id="menu-toggle" class="md:hidden p-3 text-2xl">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero-bg min-h-screen flex items-center pt-20">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
      <div class="space-y-10">
        <h1 class="text-6xl md:text-7xl font-bold leading-none tracking-tighter">
          3D Artist<br>
          <span class="accent-gradient bg-clip-text text-transparent">Hard Surface</span>
        </h1>
        <p class="text-2xl text-purple-200">Hi, I'm Yana</p>
        <p class="max-w-lg text-lg text-gray-300">
          I create clean, high-quality hard surface assets optimized for games.
        </p>
        <div class="flex flex-wrap gap-6">
          <a href="portfolio.html" class="accent-gradient px-10 py-5 rounded-3xl font-semibold text-lg hover:scale-105 transition-all">
            View Portfolio
          </a>
          <a href="#contact" class="border border-white/40 hover:border-white px-10 py-5 rounded-3xl font-medium transition-all">
            Get in touch
          </a>
        </div>
      </div>
      
      <div class="flex justify-center">
        <div class="w-[340px] h-[340px] rounded-full border-8 border-purple-500/30 overflow-hidden bg-[#1a1033] flex items-center justify-center text-9xl shadow-2xl ring-1 ring-purple-500/20">
          👩‍🎨
        </div>
      </div>
    </div>
  </section>

  <!-- ABOUT, SKILLS, RESUME, CONTACT — можна залишити з попередньої версії або сказати, якщо треба оновити -->

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const icon = toggleBtn.querySelector('i');

    toggleBtn.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      icon.classList.toggle('fa-moon');
      icon.classList.toggle('fa-sun');
    });
  </script>
</body>
</html>

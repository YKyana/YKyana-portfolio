<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yana Kyslichenko | Hard Surface Artist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }   /* Плавний скрол */
    body { 
      font-family: 'Inter', sans-serif; 
      transition: all 0.5s ease;
    }
    .hero-bg { background: #101114; }
    .accent { color: #9AA3AD; }
    .text-light { color: #E7EAEE; }
    .text-muted { color: #9AA3AD; }

    /* Світла тема */
    body.light {
      background: #E7EAEE;
      color: #101114;
    }
    body.light .hero-bg { background: #E7EAEE; }
    body.light .accent { color: #4A4F59; }
    body.light .text-light { color: #101114; }
    body.light .text-muted { color: #4A4F59; }
    body.light .bg-[#2B2E35] { background: #F1F3F5; }
    body.light .bg-[#101114] { background: #E7EAEE; }
  </style>
</head>
<body class="bg-[#101114] text-[#E7EAEE]">

  <!-- HEADER -->
  <header class="fixed top-0 w-full z-50 bg-[#101114]/95 backdrop-blur-md border-b border-[#2B2E35]">
    <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
      <a href="#" class="text-3xl font-bold hover:text-[#9AA3AD] transition">Yana</a>
      
      <div class="hidden md:flex gap-10 text-lg">
        <a href="#about" class="hover:text-[#9AA3AD] transition">About</a>
        <a href="#projects" class="hover:text-[#9AA3AD] transition">Projects</a>
        <a href="#resume" class="hover:text-[#9AA3AD] transition">Resume</a>
        <a href="#contact" class="hover:text-[#9AA3AD] transition">Contact</a>
      </div>

      <button id="theme-toggle" class="p-3 rounded-2xl hover:bg-[#2B2E35] transition">
        <i class="fas fa-moon text-xl"></i>
      </button>
    </nav>
  </header>

  <!-- (решта секцій така ж) -->

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const icon = themeToggle.querySelector('i');

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light');
      
      if (document.body.classList.contains('light')) {
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
      } else {
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');
      }
    });
  </script>
</body>
</html>
